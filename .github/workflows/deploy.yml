name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EC2_HOST: 54.82.73.4
  EC2_DEPLOY_PATH: /data/portfolio
  AWS_REGION: us-east-1
  ECR_REGISTRY: 873461661529.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push CMS
        uses: docker/build-push-action@v6
        with:
          context: ./apps/cms
          push: true
          tags: ${{ env.ECR_REGISTRY }}/portfolio-cms:latest

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: ${{ env.ECR_REGISTRY }}/portfolio-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_DEPLOY_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            cd ${{ env.EC2_DEPLOY_PATH }}
            export ECR_REGISTRY="${{ env.ECR_REGISTRY }}"

            # Install AWS CLI if missing
            if ! command -v aws &>/dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y -qq awscli
            fi

            cat > .env.production << 'ENVEOF'
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            APP_KEYS=${{ secrets.APP_KEYS }}
            API_TOKEN_SALT=${{ secrets.API_TOKEN_SALT }}
            ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
            TRANSFER_TOKEN_SALT=${{ secrets.TRANSFER_TOKEN_SALT }}
            STRAPI_API_TOKEN=${{ secrets.STRAPI_API_TOKEN }}
            STRAPI_PREVIEW_TOKEN=${{ secrets.STRAPI_PREVIEW_TOKEN }}
            PREVIEW_SECRET=${{ secrets.PREVIEW_SECRET }}
            REVALIDATION_SECRET=${{ secrets.REVALIDATION_SECRET }}
            AWS_REGION=us-east-1
            NEXT_PUBLIC_SITE_URL=https://portfolio.hirak.tech
            NEXT_PUBLIC_STRAPI_URL=https://api.portfolio.hirak.tech
            PUBLIC_URL=https://api.portfolio.hirak.tech
            DATABASE_HOST=postgres
            DATABASE_PORT=5432
            DATABASE_NAME=portfolio
            DATABASE_USERNAME=portfolio
            AWS_BUCKET=portfolio-hirak-tech-873461661529
            S3_BUCKET=portfolio-hirak-tech-873461661529
            CDN_URL=https://portfolio-hirak-tech-873461661529.s3.us-east-1.amazonaws.com
            FRONTEND_URL=https://portfolio.hirak.tech
            ENVEOF

            git pull origin main

            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose --env-file .env.production -f docker-compose.production.yml pull
            docker compose --env-file .env.production -f docker-compose.production.yml up -d --force-recreate

            rm -f .env.production

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://portfolio.hirak.tech/api/health && echo "Portfolio OK" || echo "Portfolio FAILED"
