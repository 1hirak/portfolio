services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build: ./apps/cms
    ports:
      - "1337:1337"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: portfolio
      DATABASE_USERNAME: portfolio
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-dev-password}
      APP_KEYS: ${APP_KEYS:-dev-key-1,dev-key-2}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-dev-salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-dev-jwt-secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-dev-transfer-salt}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-portfolio-hirak-tech-873461661529}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/cms:/app
      - /app/node_modules
      - /app/.cache

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      STRAPI_INTERNAL_URL: http://cms:1337
      NEXT_PUBLIC_STRAPI_URL: http://localhost:1337
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - cms
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres-data:
