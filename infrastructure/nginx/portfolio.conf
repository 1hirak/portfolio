# Upstreams
upstream portfolio-nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream portfolio-strapi {
    server 127.0.0.1:1337;
    keepalive 64;
}

# Rate limit zones
limit_req_zone $binary_remote_addr zone=portfolio-auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=portfolio-contact:10m rate=2r/s;

# HTTP → HTTPS redirect (main domain)
server {
    listen 80;
    server_name portfolio.hirak.tech www.portfolio.hirak.tech;
    return 301 https://$server_name$request_uri;
}

# HTTP → HTTPS redirect (CMS subdomain)
server {
    listen 80;
    server_name cms.portfolio.hirak.tech;
    return 301 https://$server_name$request_uri;
}

# HTTP → HTTPS redirect (API subdomain)
server {
    listen 80;
    server_name api.portfolio.hirak.tech;
    return 301 https://$server_name$request_uri;
}

# Main frontend (Next.js)
server {
    listen 443 ssl;
    http2 on;
    server_name portfolio.hirak.tech www.portfolio.hirak.tech;

    ssl_certificate /etc/letsencrypt/live/portfolio.hirak.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.hirak.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 10M;
    proxy_read_timeout 60s;

    # Maintenance page
    location /maintenance {
        root /usr/share/nginx/html;
        try_files /maintenance.html =503;
    }

    location / {
        proxy_pass http://portfolio-nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Maintenance fallback
        error_page 502 503 = @maintenance;
    }

    location @maintenance {
        root /usr/share/nginx/html;
        try_files /maintenance.html =503;
    }

    access_log /var/log/nginx/portfolio-access.log;
    error_log /var/log/nginx/portfolio-error.log;
}

# Strapi Admin (cms subdomain)
server {
    listen 443 ssl;
    http2 on;
    server_name cms.portfolio.hirak.tech;

    ssl_certificate /etc/letsencrypt/live/portfolio.hirak.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.hirak.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10M;

    # Rate limit auth endpoints
    location /admin/login {
        limit_req zone=portfolio-auth burst=10 nodelay;
        proxy_pass http://portfolio-strapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://portfolio-strapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/portfolio-cms-access.log;
    error_log /var/log/nginx/portfolio-cms-error.log;
}

# Strapi API (api subdomain)
server {
    listen 443 ssl;
    http2 on;
    server_name api.portfolio.hirak.tech;

    ssl_certificate /etc/letsencrypt/live/portfolio.hirak.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portfolio.hirak.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10M;

    location /api/contact {
        limit_req zone=portfolio-contact burst=5 nodelay;
        proxy_pass http://portfolio-strapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        limit_req zone=portfolio-auth burst=10 nodelay;
        proxy_pass http://portfolio-strapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://portfolio-strapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/portfolio-api-access.log;
    error_log /var/log/nginx/portfolio-api-error.log;
}
